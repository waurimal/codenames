<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코드네임 영어단어 멀티플레이어</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-8 flex flex-col items-center font-sans relative min-h-screen">

    <!-- 요원 등록 (입장 화면) -->
    <div id="entryScreen" class="fixed inset-0 bg-gray-100 z-[100] flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center mx-4">
            <h2 class="text-3xl font-extrabold text-gray-800 mb-2">🕵️ 요원 등록</h2>
            <p class="text-gray-500 mb-6 text-sm">게임에 참여하기 위해 소속과 팀을 선택해주세요.</p>
            
            <div class="flex gap-4 mb-4 justify-center">
                <label class="cursor-pointer flex-1">
                    <input type="radio" name="teamSelect" value="red" class="peer sr-only" checked>
                    <div class="py-3 rounded-xl border-2 border-gray-200 peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 font-bold transition-all">🔴 레드 팀</div>
                </label>
                <label class="cursor-pointer flex-1">
                    <input type="radio" name="teamSelect" value="blue" class="peer sr-only">
                    <div class="py-3 rounded-xl border-2 border-gray-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 peer-checked:text-blue-700 font-bold transition-all">🔵 블루 팀</div>
                </label>
            </div>

            <div class="flex gap-2 mb-4">
                <input type="number" id="inputGrade" placeholder="학년" class="w-1/3 border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-center">
                <input type="number" id="inputClass" placeholder="반" class="w-1/3 border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-center">
                <input type="number" id="inputNumber" placeholder="번호" class="w-1/3 border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 text-center">
            </div>
            <input type="text" id="inputName" placeholder="이름" class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 mb-6 text-center">
            <button id="btnEnterGame" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md text-lg">게임 입장</button>
        </div>
    </div>

    <!-- 로딩 오버레이 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-gray-50 z-50 flex items-center justify-center">
        <div id="loadingMessage" class="text-xl font-bold text-gray-500">게임을 불러오는 중...</div>
    </div>

    <!-- 상단 헤더 -->
    <div class="w-full max-w-5xl flex justify-between items-center mb-6 flex-wrap gap-4">
        <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-800 drop-shadow-sm flex items-center gap-3 flex-wrap">
            🕵️ CodeNames: English
            <span id="userInfoDisplay" class="text-sm sm:text-base font-semibold text-indigo-700 bg-indigo-100 px-4 py-1.5 rounded-full shadow-sm hidden">
                <!-- 학생 정보 표시 영역 -->
            </span>
        </h1>
        <button id="btnToggleTeacher" class="px-4 py-2 bg-slate-700 hover:bg-slate-800 text-white text-sm font-bold rounded shadow transition-colors">
            ⚙️ 교사 모드
        </button>
    </div>

    <!-- 교사 모드 관리 패널 (기본 숨김) -->
    <div id="teacherPanel" class="bg-white border-t-4 border-indigo-500 p-6 rounded-xl shadow-md w-full max-w-5xl mb-8 hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">교사 모드 관리 (Teacher Dashboard)</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 왼쪽: 단원 관리 및 비번 -->
            <div>
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-4">
                    <h3 class="font-bold text-lg mb-3">📚 새 단원 및 단어 추가</h3>
                    <input type="text" id="inputUnitName" placeholder="단원명 (예: Unit 1. Animals)" class="border border-gray-300 p-2 rounded mb-2 w-full focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <textarea id="inputUnitWords" placeholder="영어 단어들을 쉼표(,)나 줄바꿈으로 구분해서 입력하세요. (최소 25단어 권장)" class="border border-gray-300 p-2 rounded mb-2 w-full h-28 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
                    <button id="btnSaveUnit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 rounded transition">
                        단원 저장
                    </button>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h3 class="font-bold text-lg mb-3">🔒 비밀번호 변경</h3>
                    <div class="flex gap-2">
                        <input type="text" id="inputNewPassword" placeholder="새로운 숫자 비밀번호" class="border border-gray-300 p-2 rounded flex-1 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                        <button id="btnChangePassword" class="bg-slate-600 hover:bg-slate-700 text-white font-bold px-4 py-2 rounded transition">변경</button>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 목록 및 게임 시작 -->
            <div>
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 h-full flex flex-col">
                    <h3 class="font-bold text-lg mb-3">🎮 새 게임 시작하기</h3>
                    <div class="flex flex-col gap-2 mb-6">
                        <label class="text-sm font-semibold text-gray-600">플레이할 단원 선택:</label>
                        <select id="selectPlayUnit" class="border border-gray-300 p-2 rounded bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
                            <!-- JS로 채워짐 -->
                        </select>
                        <button id="btnStartSpecificGame" class="mt-2 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded shadow-md transition">
                            선택한 단원으로 새 게임 덮어쓰기
                        </button>
                    </div>

                    <h3 class="font-bold text-lg mb-3 border-t pt-4">📋 등록된 단원 목록</h3>
                    <div id="unitListContainer" class="overflow-y-auto flex-1 pr-2 max-h-40">
                        <!-- JS로 채워짐 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 일반 컨트롤 패널 -->
    <div class="flex flex-wrap gap-4 mb-6 justify-center">
        <button id="btnReplay" class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-lg shadow transition-colors">
            ↻ 이 단원으로 다시하기
        </button>
        <button id="btnToggleSpymaster" class="px-6 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold rounded-lg shadow transition-colors">
            요원 모드
        </button>
        <button id="btnEndTurn" class="px-6 py-2 bg-yellow-500 hover:bg-yellow-600 text-white font-bold rounded-lg shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            턴 종료
        </button>
    </div>

    <!-- 상태 보드 -->
    <div class="bg-white p-4 rounded-xl shadow-md w-full max-w-5xl flex flex-col sm:flex-row justify-between items-center mb-8 border border-gray-200">
        <div id="statusMessage" class="text-xl sm:text-2xl mb-2 sm:mb-0 text-center sm:text-left flex-1 font-medium">
            <!-- JS로 채워짐 -->
        </div>
        <div class="flex gap-6 text-xl font-bold bg-gray-50 px-4 py-2 rounded-lg border">
            <span class="text-red-500" id="redLeftDisplay">레드 남음: 9</span>
            <span class="text-blue-500" id="blueLeftDisplay">블루 남음: 8</span>
        </div>
    </div>

    <!-- 카드 그리드 -->
    <div id="cardGrid" class="grid grid-cols-5 gap-2 sm:gap-4 w-full max-w-5xl">
        <!-- JS로 채워짐 -->
    </div>

    <!-- 교사 로그인 모달 -->
    <div id="loginModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4 backdrop-blur-sm hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full">
            <h3 class="text-2xl font-extrabold mb-2 text-gray-800">교사 모드 접근</h3>
            <p class="text-gray-500 text-sm mb-6">설정된 비밀번호를 입력해주세요.</p>
            <input type="password" id="inputLoginPassword" class="border-2 border-gray-200 p-3 mb-2 w-full rounded-lg focus:outline-none focus:border-indigo-500 transition-colors text-center text-lg tracking-widest" placeholder="****">
            <p id="loginError" class="text-red-500 text-sm mb-4 font-medium hidden">비밀번호가 틀렸습니다.</p>
            <div class="flex gap-3 mt-6">
                <button id="btnCancelLogin" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-lg transition-colors">취소</button>
                <button id="btnConfirmLogin" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-lg transition-colors shadow-md">확인</button>
            </div>
        </div>
    </div>

    <!-- 범용 알림 모달 -->
    <div id="alertModal" class="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4 backdrop-blur-sm hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-md w-full">
            <p id="alertMessageText" class="mb-8 text-gray-800 font-medium text-lg leading-relaxed"></p>
            <button id="btnCloseAlert" class="bg-indigo-500 hover:bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-md transition-transform active:scale-95 w-full">확인</button>
        </div>
    </div>

    <!-- 푸터 -->
    <footer class="mt-12 text-center text-sm text-gray-500 w-full pb-4">
        <p>만든이: 곽현석(이의초등학교)</p>
        <p>Copyright &copy; 2026 Eui Elementary School. All Rights Reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDyptQIWr7DruhQxOxj1UqsOnQIpEEBChI",
            authDomain: "codenames-916b8.firebaseapp.com",
            projectId: "codenames-916b8",
            storageBucket: "codenames-916b8.firebasestorage.app",
            messagingSenderId: "919143481830",
            appId: "1:919143481830:web:cf6d9911306e881bfe1627",
            measurementId: "G-LT72B5W5SQ"
        };

        const app = initializeApp(firebaseConfig);
        try { getAnalytics(app); } catch (e) { console.warn("Analytics not supported"); }
        const auth = getAuth(app);
        const db = getFirestore(app);

        const platformAppId = typeof __app_id !== 'undefined' ? __app_id : 'codenames-custom-app';

        // 앱 전역 상태
        let currentUser = null;
        let gameData = null;
        let settingsData = null;
        let isSpymaster = false;
        let isTeacherMode = false;
        
        // 데이터 로딩 상태 추적 변수
        let settingsLoaded = false;
        let gameLoaded = false;
        let gameDocExists = false;

        // UI 요소
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingMessage = document.getElementById('loadingMessage');
        const teacherPanel = document.getElementById('teacherPanel');
        const btnToggleTeacher = document.getElementById('btnToggleTeacher');
        const selectPlayUnit = document.getElementById('selectPlayUnit');
        const unitListContainer = document.getElementById('unitListContainer');
        const cardGrid = document.getElementById('cardGrid');
        
        // --- 학생 등록 로직 ---
        const entryScreen = document.getElementById('entryScreen');
        const userInfoDisplay = document.getElementById('userInfoDisplay');
        let studentInfo = JSON.parse(sessionStorage.getItem('codenames_studentInfo'));

        // 이미 등록된 정보가 있다면 입장 화면 숨기기
        if (studentInfo) {
            entryScreen.classList.add('hidden');
            const teamColorClass = studentInfo.team === 'red' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';
            const teamIcon = studentInfo.team === 'red' ? '🔴' : '🔵';
            userInfoDisplay.className = `text-sm sm:text-base font-semibold px-4 py-1.5 rounded-full shadow-sm ${teamColorClass}`;
            userInfoDisplay.innerText = `${teamIcon} ${studentInfo.grade}학년 ${studentInfo.classNum}반 ${studentInfo.number}번 ${studentInfo.name}`;
        }

        // 입장 버튼 클릭
        document.getElementById('btnEnterGame').addEventListener('click', () => {
            const grade = document.getElementById('inputGrade').value.trim();
            const classNum = document.getElementById('inputClass').value.trim();
            const num = document.getElementById('inputNumber').value.trim();
            const name = document.getElementById('inputName').value.trim();
            const team = document.querySelector('input[name="teamSelect"]:checked').value;

            if (!grade || !classNum || !num || !name) {
                customAlert('학년, 반, 번호, 이름을 모두 입력해주세요.');
                return;
            }

            studentInfo = { grade, classNum, number: num, name, team };
            sessionStorage.setItem('codenames_studentInfo', JSON.stringify(studentInfo));
            
            entryScreen.classList.add('hidden');
            const teamColorClass = team === 'red' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';
            const teamIcon = team === 'red' ? '🔴' : '🔵';
            userInfoDisplay.className = `text-sm sm:text-base font-semibold px-4 py-1.5 rounded-full shadow-sm ${teamColorClass}`;
            userInfoDisplay.innerText = `${teamIcon} ${grade}학년 ${classNum}반 ${num}번 ${name}`;
        });

        // 커스텀 알림 함수
        function customAlert(msg) {
            document.getElementById('alertMessageText').innerText = msg;
            document.getElementById('alertModal').classList.remove('hidden');
        }
        document.getElementById('btnCloseAlert').addEventListener('click', () => {
            document.getElementById('alertModal').classList.add('hidden');
        });

        // 에러 표시 핸들러
        function showFirebaseError(title, msg) {
            loadingMessage.innerHTML = `
                <div class="text-center bg-white p-6 rounded-lg shadow-xl max-w-md border-2 border-red-200">
                    <h2 class="text-xl font-bold text-red-600 mb-3">⚠️ ${title}</h2>
                    <p class="text-gray-600 text-sm leading-relaxed">${msg}</p>
                </div>
            `;
        }

        // 셔플 알고리즘
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 새 게임 생성 로직
        function generateNewGameState(wordPool, unitId) {
            let words = [...wordPool];
            if (words.length < 25) {
                while (words.length < 25) {
                    words = [...words, ...wordPool];
                }
            }
            
            const shuffledWords = shuffle(words).slice(0, 25);
            const types = [...Array(9).fill('red'), ...Array(8).fill('blue'), ...Array(7).fill('neutral'), 'assassin'];
            const shuffledTypes = shuffle(types);

            const cards = shuffledWords.map((word, index) => ({
                id: index, word: word, type: shuffledTypes[index], revealed: false, revealedBy: null
            }));

            return { cards, redLeft: 9, blueLeft: 8, status: 'playing', currentTurn: 'red', currentUnitId: unitId };
        }

        // 인증 로직
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error: ", error);
                showFirebaseError(
                    "인증 실패", 
                    "Firebase 프로젝트의 Authentication 탭에서 <strong>'익명 로그인(Anonymous)'</strong>이 활성화되어 있는지 확인해주세요."
                );
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                initRealtimeListeners();
            }
        });

        // 로딩 완료 확인 함수
        function checkAndHideLoading() {
            if (settingsLoaded && gameLoaded) {
                loadingOverlay.classList.add('hidden');
                renderGame();
            }
        }

        // 데이터 리스너
        function initRealtimeListeners() {
            const settingsDocRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'settings', 'shared');
            const gameDocRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'gameState', 'shared');

            // 1. Settings 리스너
            onSnapshot(settingsDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    settingsData = docSnap.data();
                    settingsLoaded = true;
                    renderTeacherDashboard();
                    
                    if (!gameDocExists && settingsData) {
                        const defaultUnit = settingsData.units[0];
                        setDoc(gameDocRef, generateNewGameState(defaultUnit.words, defaultUnit.id));
                    }
                    
                    checkAndHideLoading();
                } else {
                    setDoc(settingsDocRef, {
                        password: '1234',
                        units: [{
                            id: 'default_english',
                            name: 'Basic English Words',
                            words: ['apple', 'banana', 'orange', 'grape', 'melon', 'water', 'fire', 'earth', 'wind', 'sky',
                                    'sun', 'moon', 'star', 'planet', 'comet', 'tree', 'flower', 'grass', 'leaf', 'root',
                                    'dog', 'cat', 'bird', 'fish', 'bug', 'car', 'train', 'plane', 'boat', 'bike']
                        }]
                    });
                }
            }, (error) => {
                console.error("Settings Sync Error:", error);
                showFirebaseError("데이터베이스 권한 오류", "Firestore Database의 <strong>규칙(Rules)</strong> 탭에서 읽기/쓰기 권한이 막혀있는지 확인해주세요.");
            });

            // 2. Game 리스너
            onSnapshot(gameDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    gameDocExists = true;
                    gameData = docSnap.data();
                    gameLoaded = true;
                    checkAndHideLoading();
                } else {
                    gameDocExists = false;
                    if (settingsData) {
                        const defaultUnit = settingsData.units[0];
                        setDoc(gameDocRef, generateNewGameState(defaultUnit.words, defaultUnit.id));
                    }
                }
            }, (error) => {
                console.error("Game Sync Error:", error);
            });
        }

        // 게임 렌더링
        function renderGame() {
            if (!gameData || !settingsData) return;

            // 상태 메시지 업데이트
            const statusBox = document.getElementById('statusMessage');
            const currentUnitName = settingsData.units.find(u => u.id === gameData.currentUnitId)?.name || '알 수 없는 단원';
            
            let statusHtml = '';
            if (gameData.status === 'red_win') statusHtml = '<span class="text-red-600">🎉 레드 팀 승리! (모든 요원 발견)</span>';
            else if (gameData.status === 'blue_win') statusHtml = '<span class="text-blue-600">🎉 블루 팀 승리! (모든 요원 발견)</span>';
            else if (gameData.status === 'assassin_red') statusHtml = '<span class="text-blue-600">💥 게임 오버! 레드 팀이 암살자를 건드렸습니다. (블루 팀 승리)</span>';
            else if (gameData.status === 'assassin_blue') statusHtml = '<span class="text-red-600">💥 게임 오버! 블루 팀이 암살자를 건드렸습니다. (레드 팀 승리)</span>';
            else {
                const turnStr = gameData.currentTurn === 'red' ? '<strong class="text-red-600">레드 팀</strong>' : '<strong class="text-blue-600">블루 팀</strong>';
                statusHtml = `현재 턴: ${turnStr}`;
            }
            statusBox.innerHTML = `${statusHtml} <span class="text-sm text-gray-400 ml-4 font-normal">| 현재 단원: ${currentUnitName}</span>`;

            document.getElementById('redLeftDisplay').innerText = `레드 남음: ${gameData.redLeft}`;
            document.getElementById('blueLeftDisplay').innerText = `블루 남음: ${gameData.blueLeft}`;

            // 카드 그리드 렌더링
            cardGrid.innerHTML = '';
            gameData.cards.forEach(card => {
                const div = document.createElement('div');
                
                let bg = "bg-white", text = "text-gray-800", border = "border-gray-300", cursor = "cursor-pointer hover:-translate-y-1";

                if (card.revealed) {
                    cursor = "cursor-default";
                    if (card.type === 'red') { bg = "bg-red-500"; text = "text-white"; border = "border-red-600"; }
                    else if (card.type === 'blue') { bg = "bg-blue-500"; text = "text-white"; border = "border-blue-600"; }
                    else if (card.type === 'neutral') { bg = "bg-stone-300"; text = "text-stone-700"; border = "border-stone-400"; }
                    else if (card.type === 'assassin') { bg = "bg-gray-900"; text = "text-white"; border = "border-black"; }
                } else if (isSpymaster) {
                    cursor = "cursor-not-allowed";
                    if (card.type === 'red') { bg = "bg-red-100"; text = "text-red-700"; border = "border-red-300"; }
                    else if (card.type === 'blue') { bg = "bg-blue-100"; text = "text-blue-700"; border = "border-blue-300"; }
                    else if (card.type === 'neutral') { bg = "bg-stone-50"; text = "text-stone-500"; border = "border-stone-200"; }
                    else if (card.type === 'assassin') { bg = "bg-gray-300"; text = "text-gray-900"; border = "border-gray-500"; }
                }

                div.className = `flex flex-col items-center justify-center h-20 sm:h-28 rounded-xl border-2 sm:border-b-4 font-bold text-base sm:text-lg md:text-2xl shadow-sm transition-all duration-200 select-none uppercase tracking-wide relative overflow-hidden ${bg} ${text} ${border} ${cursor}`;
                
                // 단어 텍스트
                const wordSpan = document.createElement('span');
                wordSpan.innerText = card.word;
                div.appendChild(wordSpan);

                // 누가 뒤집었는지 표시
                if (card.revealed && card.revealedBy) {
                    const revealer = document.createElement('span');
                    revealer.innerText = card.revealedBy;
                    revealer.className = "absolute bottom-1 right-2 text-[10px] opacity-70 font-normal";
                    div.appendChild(revealer);
                }
                
                div.addEventListener('click', () => handleCardClick(card.id));
                cardGrid.appendChild(div);
            });

            document.getElementById('btnEndTurn').disabled = (gameData.status !== 'playing');
        }

        // 교사 대시보드 렌더링
        function renderTeacherDashboard() {
            if (!settingsData) return;
            
            selectPlayUnit.innerHTML = '';
            settingsData.units.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.id;
                opt.innerText = `${u.name} (${u.words.length}단어)`;
                selectPlayUnit.appendChild(opt);
            });

            unitListContainer.innerHTML = '';
            settingsData.units.forEach(u => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white border border-gray-200 p-2 rounded mb-2";
                div.innerHTML = `
                    <span class="font-medium text-gray-700 truncate mr-2">${u.name} <span class="text-xs text-gray-400">(${u.words.length})</span></span>
                    <button class="btn-delete text-red-500 text-sm hover:text-red-700 px-2 py-1 bg-red-50 rounded" data-id="${u.id}">삭제</button>
                `;
                unitListContainer.appendChild(div);
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const unitId = e.target.getAttribute('data-id');
                    const updatedUnits = settingsData.units.filter(u => u.id !== unitId);
                    if (updatedUnits.length === 0) return customAlert('최소 1개의 단원은 남아있어야 합니다.');
                    const settingsRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'settings', 'shared');
                    await setDoc(settingsRef, { ...settingsData, units: updatedUnits });
                });
            });
        }

        // 카드 클릭 로직
        function handleCardClick(id) {
            if (!gameData || gameData.status !== 'playing' || isSpymaster) return;
            
            const cardIndex = gameData.cards.findIndex(c => c.id === id);
            if (gameData.cards[cardIndex].revealed) return;

            const newCards = [...gameData.cards];
            const card = newCards[cardIndex];
            card.revealed = true;
            
            // 클릭한 학생 이름 및 팀 아이콘 저장
            const teamIcon = studentInfo ? (studentInfo.team === 'red' ? '🔴' : '🔵') : '👤';
            card.revealedBy = studentInfo ? `${teamIcon} ${studentInfo.name}` : '알 수 없음';

            let newRedLeft = gameData.redLeft, newBlueLeft = gameData.blueLeft;
            let newStatus = gameData.status, newTurn = gameData.currentTurn;

            if (card.type === 'red') newRedLeft--;
            if (card.type === 'blue') newBlueLeft--;

            if (card.type === 'assassin') {
                newStatus = gameData.currentTurn === 'red' ? 'assassin_red' : 'assassin_blue';
                newCards.forEach(c => {
                    if(!c.revealed) {
                        c.revealed = true;
                        c.revealedBy = null; // 남은 카드는 모두 자동 공개 처리
                    }
                });
            } else if (newRedLeft === 0) {
                newStatus = 'red_win';
                newCards.forEach(c => c.revealed = true);
            } else if (newBlueLeft === 0) {
                newStatus = 'blue_win';
                newCards.forEach(c => c.revealed = true);
            } else {
                if ((gameData.currentTurn === 'red' && card.type !== 'red') || 
                    (gameData.currentTurn === 'blue' && card.type !== 'blue')) {
                    newTurn = gameData.currentTurn === 'red' ? 'blue' : 'red';
                }
            }

            const gameDocRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'gameState', 'shared');
            setDoc(gameDocRef, { ...gameData, cards: newCards, redLeft: newRedLeft, blueLeft: newBlueLeft, status: newStatus, currentTurn: newTurn });
        }

        // 교사 모드 토글
        btnToggleTeacher.addEventListener('click', () => {
            if (isTeacherMode) {
                isTeacherMode = false;
                teacherPanel.classList.add('hidden');
                btnToggleTeacher.innerText = '⚙️ 교사 모드';
                btnToggleTeacher.classList.replace('bg-slate-500', 'bg-slate-700');
            } else {
                document.getElementById('loginModal').classList.remove('hidden');
                document.getElementById('inputLoginPassword').value = '';
                document.getElementById('inputLoginPassword').focus();
                document.getElementById('loginError').classList.add('hidden');
            }
        });

        // 비밀번호 확인 로직
        function tryLogin() {
            const inputPw = document.getElementById('inputLoginPassword').value;
            if (inputPw === settingsData?.password) {
                document.getElementById('loginModal').classList.add('hidden');
                isTeacherMode = true;
                teacherPanel.classList.remove('hidden');
                btnToggleTeacher.innerText = '교사 모드 종료';
                btnToggleTeacher.classList.replace('bg-slate-700', 'bg-slate-500');
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }
        document.getElementById('btnConfirmLogin').addEventListener('click', tryLogin);
        document.getElementById('inputLoginPassword').addEventListener('keydown', (e) => { if(e.key === 'Enter') tryLogin(); });
        document.getElementById('btnCancelLogin').addEventListener('click', () => document.getElementById('loginModal').classList.add('hidden'));

        // 단원 저장
        document.getElementById('btnSaveUnit').addEventListener('click', async () => {
            const name = document.getElementById('inputUnitName').value;
            const wordsRaw = document.getElementById('inputUnitWords').value;
            
            if (!name.trim()) return customAlert('단원명을 입력해주세요.');
            const wordList = wordsRaw.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
            if (wordList.length === 0) return customAlert('단어를 하나 이상 입력해주세요.');
            if (wordList.length < 25) customAlert('⚠️ 주의: 단어가 25개 미만입니다. 게임 판을 채우기 위해 단어가 중복되어 나타날 수 있습니다.');

            const newUnit = { id: Date.now().toString(), name: name, words: wordList };
            const updatedUnits = [...(settingsData.units || []), newUnit];
            
            const settingsRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'settings', 'shared');
            await setDoc(settingsRef, { ...settingsData, units: updatedUnits });
            
            document.getElementById('inputUnitName').value = '';
            document.getElementById('inputUnitWords').value = '';
        });

        // 비밀번호 변경
        document.getElementById('btnChangePassword').addEventListener('click', async () => {
            const newPw = document.getElementById('inputNewPassword').value;
            if (!newPw.trim()) return customAlert('새 비밀번호를 입력해주세요.');
            const settingsRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'settings', 'shared');
            await setDoc(settingsRef, { ...settingsData, password: newPw });
            document.getElementById('inputNewPassword').value = '';
            customAlert('비밀번호가 성공적으로 변경되었습니다.');
        });

        // 특정 단원으로 새 게임 시작
        document.getElementById('btnStartSpecificGame').addEventListener('click', async () => {
            const unitId = selectPlayUnit.value;
            const unit = settingsData.units.find(u => u.id === unitId) || settingsData.units[0];
            const newState = generateNewGameState(unit.words, unit.id);
            const gameDocRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'gameState', 'shared');
            await setDoc(gameDocRef, newState);
            isSpymaster = false;
            updateSpymasterUI();
            customAlert(`'${unit.name}' 단원으로 게임이 시작되었습니다.`);
        });

        // 현재 단원으로 다시하기
        document.getElementById('btnReplay').addEventListener('click', async () => {
            if (!settingsData || !gameData) return;
            const unitId = gameData.currentUnitId || settingsData.units[0].id;
            const unit = settingsData.units.find(u => u.id === unitId) || settingsData.units[0];
            const newState = generateNewGameState(unit.words, unit.id);
            const gameDocRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'gameState', 'shared');
            await setDoc(gameDocRef, newState);
            isSpymaster = false;
            updateSpymasterUI();
        });

        // 스파이마스터 토글
        const btnToggleSpymaster = document.getElementById('btnToggleSpymaster');
        function updateSpymasterUI() {
            if (isSpymaster) {
                btnToggleSpymaster.innerText = '👁️ 팀장(스파이마스터) 모드 ON';
                btnToggleSpymaster.classList.replace('bg-gray-300', 'bg-purple-600');
                btnToggleSpymaster.classList.replace('hover:bg-gray-400', 'hover:bg-purple-700');
                btnToggleSpymaster.classList.replace('text-gray-800', 'text-white');
            } else {
                btnToggleSpymaster.innerText = '요원 모드';
                btnToggleSpymaster.classList.replace('bg-purple-600', 'bg-gray-300');
                btnToggleSpymaster.classList.replace('hover:bg-purple-700', 'hover:bg-gray-400');
                btnToggleSpymaster.classList.replace('text-white', 'text-gray-800');
            }
            renderGame(); // 그리드 리렌더링
        }
        btnToggleSpymaster.addEventListener('click', () => {
            isSpymaster = !isSpymaster;
            updateSpymasterUI();
        });

        // 턴 종료
        document.getElementById('btnEndTurn').addEventListener('click', async () => {
            if (!gameData || gameData.status !== 'playing') return;
            const gameDocRef = doc(db, 'artifacts', platformAppId, 'public', 'data', 'gameState', 'shared');
            await setDoc(gameDocRef, { ...gameData, currentTurn: gameData.currentTurn === 'red' ? 'blue' : 'red' });
        });

        // 실행
        initAuth();
    </script>
</body>
</html>
